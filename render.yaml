# Blueprint for git root: Documentos/appEntrenador
services:
  - type: web
    name: trainfit-api
    runtime: node
    rootDir: appEntrenador/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: coach_db
      - key: CORS_ORIGINS
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
